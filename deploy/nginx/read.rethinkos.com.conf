server {
    listen 80;
    server_name read.rethinkos.com;

    return 301 https://read.rethinkos.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name read.rethinkos.com;

    ssl_certificate /etc/nginx/ssl/live/rethinkos.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/rethinkos.com/privkey.pem;

    access_log /var/log/nginx/read.rethinkos.access.log;
    error_log /var/log/nginx/read.rethinkos.error.log;

    client_max_body_size 200M;

    location /api/ {
        proxy_pass http://100.109.172.125:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
    }

    location /assets/ {
        proxy_pass http://100.109.172.125:1080/www/$host$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public, immutable";
        proxy_buffering off;
        proxy_http_version 1.1;
    }

    location / {
        proxy_pass http://100.109.172.125:1080/www/$host$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_http_version 1.1;
    }
}
